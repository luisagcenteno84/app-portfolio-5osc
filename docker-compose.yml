services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - FIRESTORE_COLLECTION=items

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend