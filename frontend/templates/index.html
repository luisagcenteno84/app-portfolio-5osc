<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="tag">Portfolio</p>
      <h1>{{ title }}</h1>
      <p class="subtitle">{{ subtitle }}</p>
    </section>

    <section class="grid">
      {% for card in cards %}
      <article class="card">
        <p class="status">{{ card.status }}</p>
        <h2>{{ card.title }}</h2>
        <p>{{ card.desc }}</p>
        <a class="card-link" href="{{ card.url }}" target="_blank" rel="noopener noreferrer">Visit landing page</a>
      </article>
      {% endfor %}
    </section>
  </main>
</body>
</html>
